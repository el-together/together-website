<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team — together.day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'TT Commons Pro';
      src: url('./assets/TT Commons Pro Variable.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    /* Reset */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Base */
    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'TT Commons Pro', sans-serif;
      color: #1a1a1a;
      background: #fff;
      line-height: 1.7;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid #e8e8e8;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 100;
    }

    .header-logo img {
      height: 40px;
      width: auto;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    nav a {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #666;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }

    nav a:hover {
      color: #1a1a1a;
    }

    .btn-get-app {
      border: 1px solid #e8e8e8;
      padding: 6px 18px;
      border-radius: 14px;
      color: #1a1a1a !important;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .btn-get-app:hover {
      background: #1a1a1a;
      color: #fff !important;
    }

    /* Content area */
    .content-area {
      background: #faf8f5;
      padding-bottom: 80px;
    }

    /* Page content */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .page-title-area {
      padding: 80px 0 24px;
    }

    .page-title-area h1 {
      font-family: 'TT Commons Pro', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1.3;
      color: #1a1a1a;
    }

    .page-separator {
      border: none;
      border-top: 1px solid #e8e8e8;
      margin: 0;
    }

    .page-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0 48px;
      font-family: 'Geist Mono', monospace;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #999;
    }

    /* Team list */
    .team-list {
      padding-bottom: 80px;
    }

    .team-member {
      margin-bottom: 40px;
    }

    .team-member h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .team-member .role {
      font-family: 'Geist Mono', monospace;
      font-weight: 300;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #999;
    }

    /* Footer */
    footer {
      margin-top: 0;
      border-top: 1px solid #e8e8e8;
      padding: 48px 40px;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .footer-logo img {
      height: 24px;
      width: auto;
      opacity: 0.5;
    }

    .footer-links {
      display: flex;
      gap: 64px;
    }

    .footer-col h4 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .footer-col a {
      display: block;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #888;
      text-decoration: none;
      margin-bottom: 10px;
      transition: color 0.2s;
    }

    .footer-col a:hover {
      color: #1a1a1a;
    }

    .footer-bottom {
      max-width: 1100px;
      margin: 40px auto 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 12px;
      color: #bbb;
    }

    .footer-bottom a {
      color: #bbb;
      text-decoration: none;
      margin-right: 16px;
    }

    .footer-bottom a:hover { color: #888; }

    /* Responsive */
    @media (max-width: 768px) {
      header {
        padding: 16px 20px;
      }

      nav {
        gap: 20px;
      }

      .page-title-area {
        padding: 60px 0 20px;
      }

      .page {
        padding: 0 20px;
      }

      .footer-inner {
        flex-direction: column;
        gap: 32px;
      }

      .footer-links {
        gap: 40px;
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <a href="/" class="header-logo">
      <img src="./assets/Logo 2.1 negro.svg" alt="together">
    </a>
    <nav>
      <a href="/blog">Blog</a>
      <a href="#" class="btn-get-app">Get the app</a>
    </nav>
  </header>

  <!-- Page -->
  <div class="content-area">
  <div class="page">

    <div class="page-title-area">
      <h1>Team</h1>
    </div>
    <hr class="page-separator">
    <div class="page-meta">
      <span>THE PEOPLE BEHIND TOGETHER</span>
    </div>

    <div class="team-list">
      <div class="team-member">
        <h2>Walter Kobylanski</h2>
        <span class="role">CEO</span>
      </div>
    </div>

  </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-inner">
      <div class="footer-logo">
        <img src="./assets/Logo 2.1 negro.svg" alt="together">
      </div>
      <div class="footer-links">
        <div class="footer-col">
          <h4>Product</h4>
          <a href="/about">About</a>
          <a href="/team">Team</a>
          <a href="/blog">Blog</a>
        </div>
        <div class="footer-col">
          <h4>Connect</h4>
          <a href="/contact">Contact us</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <a href="/privacy">Privacy</a>
      <a href="/legal">Terms</a>
      <span>&copy; 2026 Together</span>
    </div>
  </footer>

</body>
</html>
