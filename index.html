<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>together.day</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'TT Commons Pro';
      src: url('./assets/TT Commons Pro Variable.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'TT Commons Pro', sans-serif;
      color: #1a1a1a;
      background: #fff;
      line-height: 1.7;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid #e8e8e8;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 100;
    }

    .header-logo img { height: 40px; width: auto; }

    nav { display: flex; align-items: center; gap: 32px; }

    nav a {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #666;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.2s;
    }

    nav a:hover { color: #1a1a1a; }

    .btn-get-app {
      border: 1px solid #e8e8e8;
      padding: 6px 18px;
      border-radius: 14px;
      color: #1a1a1a !important;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    .btn-get-app:hover {
      background: #1a1a1a;
      color: #fff !important;
    }

    .content-area {
      background: #faf8f5;
      padding-bottom: 80px;
    }

    .hero-section {
      max-width: 680px;
      margin: 0 auto;
      padding: 120px 24px 0;
      text-align: center;
    }

    .hero-section h1 {
      font-size: 3rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    .hero-section p {
      font-size: 1.15rem;
      font-weight: 500;
      color: #555;
      max-width: 480px;
      margin: 0 auto;
    }

    footer {
      margin-top: 0;
      border-top: 1px solid #e8e8e8;
      padding: 48px 40px;
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .footer-logo img { height: 24px; width: auto; opacity: 0.5; }

    .footer-links { display: flex; gap: 64px; }

    .footer-col h4 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 16px;
    }

    .footer-col a {
      display: block;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #888;
      text-decoration: none;
      margin-bottom: 10px;
      transition: color 0.2s;
    }

    .footer-col a:hover { color: #1a1a1a; }

    .footer-bottom {
      max-width: 1100px;
      margin: 40px auto 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 12px;
      color: #bbb;
    }

    .footer-bottom a {
      color: #bbb;
      text-decoration: none;
      margin-right: 16px;
    }

    .footer-bottom a:hover { color: #888; }

    @media (max-width: 768px) {
      header { padding: 16px 20px; }
      nav { gap: 20px; }
      .hero-section { padding: 80px 20px 0; }
      .hero-section h1 { font-size: 2.2rem; }
      .footer-inner { flex-direction: column; gap: 32px; }
      .footer-links { gap: 40px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>

  <header>
    <a href="/" class="header-logo">
      <img src="./assets/Logo 2.1 negro.svg" alt="together">
    </a>
    <nav>
      <a href="/blog">Blog</a>
      <a href="#" class="btn-get-app">Get the app</a>
    </nav>
  </header>

  <div class="content-area">
    <div class="hero-section">
      <h1>together</h1>
      <p>A platform for the people you care about. Built by humans, for humans.</p>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <div class="footer-logo">
        <img src="./assets/Logo 2.1 negro.svg" alt="together">
      </div>
      <div class="footer-links">
        <div class="footer-col">
          <h4>Product</h4>
          <a href="/about">About</a>
          <a href="/team">Team</a>
          <a href="/blog">Blog</a>
        </div>
        <div class="footer-col">
          <h4>Connect</h4>
          <a href="/contact">Contact us</a>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <a href="/privacy">Privacy</a>
      <a href="/legal">Terms</a>
      <span>&copy; 2026 Together</span>
    </div>
  </footer>

</body>
</html>
